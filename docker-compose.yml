services:
  db:
    image: mysql:latest
    container_name: ${DB_NAME:-yummicious_db}
    restart: always
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - MYSQL_DATABASE=${DB_NAME:-yummicious_db}
      - MYSQL_USER=${DB_USER:-delivery_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-delivery_pass}
      - MYSQL_ROOT_PASSWORD=${SECRET_KEY:-super-secret-key-change-it-in-production}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - ./database/db_files:/var/lib/mysql
      - ./database/esquemas:/docker-entrypoint-initdb.d
    networks:
      - delivery_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${BACKEND_NAME:-yummicious_back}
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-delivery_user}
      - DB_PASSWORD=${DB_PASSWORD:-delivery_pass}
      - DB_NAME=${DB_NAME:-yummicious_db}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - delivery_network

  frontend:
    image: node:22-alpine
    container_name: ${FRONTEND_NAME:-yummicious_front}
    restart: always
    working_dir: /app
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - API_PROXY_TARGET=http://backend:8000
      - VITE_HOST=0.0.0.0
    volumes:
      - ./:/app
    ports:
      - "4173:4173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev:frontend -- --host 0.0.0.0 --port 4173"
    networks:
      - delivery_network

networks:
  delivery_network:
    driver: bridge
