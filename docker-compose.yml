version: '3.8'

services:
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: delivery_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./app/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - delivery_network

  backend:
    build:
      context: ./service/backend
      dockerfile: Dockerfile
    container_name: delivery_backend
    ports:
      - "3000:3000"
    volumes:
      - ./service/backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=delivery_root_password
      - DB_NAME=delivery_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - delivery_network

  db:
    image: mysql:8.0
    container_name: delivery_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=delivery_root_password
      - MYSQL_DATABASE=delivery_db
      - MYSQL_USER=delivery_user
      - MYSQL_PASSWORD=delivery_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - delivery_network

  redis:
    image: redis:alpine
    container_name: delivery_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - delivery_network

networks:
  delivery_network:
    driver: bridge

volumes:
  db_data:
  redis_data: